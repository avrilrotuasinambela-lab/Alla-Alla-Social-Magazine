<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majalah Interaktif</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* HALAMAN AWAL */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #222;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3em;
    }

    /* SCROLL */
    .scroll {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eee;
    }

    .book-btn {
      width: 150px;
      height: 200px;
      background: url('https://via.placeholder.com/150x200') center/cover;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .book-btn:hover {
      transform: scale(1.1);
    }

    /* HALAMAN BUKU */
    .book-page {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #111;
      flex-direction: column;
    }

    .book {
      width: 300px;
      height: 400px;
      perspective: 1000px;
      position: relative;
    }

    .page {
      width: 100%;
      height: 100%;
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      transform-origin: left;
      transition: transform 1s;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .controls {
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HALAMAN AWAL -->
  <section class="hero">
    <h1>Selamat Datang di Majalahku</h1>
    <p>Scroll ke bawah</p>
  </section>

  <!-- TOMBOL BUKU -->
  <section class="scroll">
    <button class="book-btn" onclick="openBook()"></button>
  </section>

  <!-- BUKU -->
  <section class="book-page" id="bookPage">
    <div class="book">
      <div class="page" id="p1">Halaman 1</div>
      <div class="page" id="p2">Halaman 2</div>
    </div>

    <div class="controls">
      <button onclick="flip()">Flip</button>
      <button onclick="closeBook()">Kembali</button>
    </div>
  </section>

  <script>
    let flipped = false;

    function openBook() {
      document.getElementById("bookPage").style.display = "flex";
      window.scrollTo(0,0);
    }

    function closeBook() {
      document.getElementById("bookPage").style.display = "none";
    }

    function flip() {
      flipped = !flipped;
      document.getElementById("p1").classList.toggle("flipped");
      document.getElementById("p2").classList.toggle("flipped");
    }
  </script>

</body>
</html>
